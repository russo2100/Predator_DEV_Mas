services:
  predator-bot:
    build: .
    container_name: predator_trading_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
    working_dir: /app
    command: ["python", "-m", "src.main"]
    volumes:
      - ./memory:/app/memory
      - ./news.txt:/app/news.txt
      - ./logs:/app/logs
      - ./shadow_agents_log.jsonl:/app/shadowagentslog.jsonl
