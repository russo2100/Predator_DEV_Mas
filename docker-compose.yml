services:
  predator-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: predatortradingbot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    working_dir: /app
    command: ["python", "-m", "src.main"]
    volumes:
      - ./memory:/app/memory
      - ./logs:/app/logs
      - ./shadow_agents_log.jsonl:/app/shadow_agents_log.jsonl
      - ./news_fire.txt:/app/news_fire.txt:ro
